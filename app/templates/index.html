<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watchlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .calendar-day { min-height: 36px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-init="init()">
    <div class="max-w-lg mx-auto px-3 py-3">
        <!-- Compact Header -->
        <div class="flex items-center justify-between mb-3">
            <h1 class="text-xl font-bold text-gray-800">Watchlist</h1>
            <div class="flex items-center gap-2">
                <!-- View Toggle -->
                <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-600'" class="p-2 rounded-lg transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                    </svg>
                </button>
                <button @click="viewMode = 'calendar'" :class="viewMode === 'calendar' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-600'" class="p-2 rounded-lg transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </button>
                <button @click="showMenu = !showMenu" class="p-2 bg-gray-200 text-gray-600 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                    </svg>
                </button>
                <!-- Dropdown Menu -->
                <div x-show="showMenu" x-cloak @click.away="showMenu = false" class="absolute right-3 top-14 bg-white rounded-lg shadow-lg border border-gray-100 py-1 z-50 min-w-[140px]">
                    <button @click="statusFilter = 'pending'; showMenu = false; fetchItems()" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex justify-between">
                        <span>Pending</span>
                        <span class="text-gray-400" x-text="stats.pending"></span>
                    </button>
                    <button @click="statusFilter = 'completed'; showMenu = false; fetchItems()" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex justify-between">
                        <span>Completed</span>
                        <span class="text-gray-400" x-text="stats.completed"></span>
                    </button>
                    <button @click="statusFilter = 'all'; showMenu = false; fetchItems()" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex justify-between">
                        <span>All</span>
                        <span class="text-gray-400" x-text="stats.total"></span>
                    </button>
                    <div class="border-t border-gray-100 my-1"></div>
                    <button @click="logout(); showMenu = false" class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 text-red-600">Logout</button>
                </div>
            </div>
        </div>

        <!-- Add URL Form -->
        <div class="mb-3">
            <form @submit.prevent="addItem()" class="flex gap-2">
                <input
                    type="url"
                    x-model="newUrl"
                    placeholder="Paste link..."
                    required
                    class="flex-1 px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm"
                    :disabled="isLoading"
                >
                <button
                    type="submit"
                    :disabled="isLoading || !newUrl"
                    class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition font-medium text-sm disabled:bg-gray-300"
                    x-text="isLoading ? '...' : 'Add'"
                ></button>
            </form>
        </div>

        <!-- Calendar View -->
        <div x-show="viewMode === 'calendar'" x-cloak class="bg-white rounded-lg shadow-sm p-3 mb-3">
            <!-- Calendar Navigation -->
            <div class="flex items-center justify-between mb-2">
                <button @click="previousMonth()" class="p-1 hover:bg-gray-100 rounded">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <span class="text-sm font-medium text-gray-700" x-text="calendarTitle"></span>
                <button @click="nextMonth()" class="p-1 hover:bg-gray-100 rounded">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
            </div>

            <!-- Calendar Grid -->
            <div class="grid grid-cols-7 gap-0.5">
                <template x-for="day in ['S', 'M', 'T', 'W', 'T', 'F', 'S']" :key="day">
                    <div class="text-center text-xs text-gray-400 py-1" x-text="day"></div>
                </template>

                <template x-for="(day, index) in calendarDays" :key="index">
                    <div
                        class="calendar-day flex flex-col items-center justify-center rounded cursor-pointer text-xs"
                        :class="{
                            'text-gray-300': !day.currentMonth,
                            'text-gray-700': day.currentMonth && day.date !== selectedDate,
                            'bg-blue-500 text-white': day.date === selectedDate,
                            'hover:bg-gray-100': day.currentMonth && day.date !== selectedDate
                        }"
                        @click="selectDate(day)"
                    >
                        <span x-text="day.day"></span>
                        <span x-show="day.hasItems && day.date !== selectedDate" class="w-1 h-1 bg-blue-500 rounded-full mt-0.5"></span>
                    </div>
                </template>
            </div>

            <!-- Selected Date Items -->
            <div x-show="selectedDateItems.length > 0" class="mt-3 pt-3 border-t border-gray-100 space-y-2 max-h-48 overflow-y-auto">
                <template x-for="item in selectedDateItems" :key="item.id">
                    <div class="flex items-center gap-2 p-2 bg-gray-50 rounded">
                        <button @click="toggleComplete(item)" :class="item.completed ? 'text-green-500' : 'text-gray-300'">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                            </svg>
                        </button>
                        <a :href="item.url" target="_blank" class="flex-1 text-sm truncate" :class="item.completed ? 'text-gray-400 line-through' : 'text-gray-700'" x-text="item.title || 'Untitled'"></a>
                        <button @click="deleteItem(item.id)" class="text-gray-300 hover:text-red-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </template>
            </div>

            <div x-show="selectedDate && selectedDateItems.length === 0" class="mt-3 pt-3 border-t border-gray-100 text-center text-xs text-gray-400">
                No items on this date
            </div>
        </div>

        <!-- Items List -->
        <div x-show="viewMode === 'list'" class="space-y-2">
            <template x-for="(group, date) in groupedItems" :key="date">
                <div>
                    <div class="text-xs font-medium text-gray-400 mb-1 px-1" x-text="date"></div>
                    <div class="space-y-1">
                        <template x-for="item in group" :key="item.id">
                            <div class="bg-white rounded-lg p-3 shadow-sm">
                                <div class="flex items-start gap-2">
                                    <button
                                        @click="toggleComplete(item)"
                                        class="mt-0.5 flex-shrink-0"
                                        :class="item.completed ? 'text-green-500' : 'text-gray-300 hover:text-green-500'"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" :fill="item.completed ? 'currentColor' : 'none'" />
                                        </svg>
                                    </button>

                                    <div class="flex-1 min-w-0">
                                        <a :href="item.url" target="_blank" class="block">
                                            <div class="text-sm font-medium truncate" :class="item.completed ? 'text-gray-400 line-through' : 'text-gray-800'" x-text="item.title || 'Untitled'"></div>
                                        </a>
                                        <div class="flex items-center gap-2 mt-0.5">
                                            <span
                                                class="text-xs px-1.5 py-0.5 rounded"
                                                :class="{
                                                    'bg-red-50 text-red-600': item.source_type === 'youtube',
                                                    'bg-blue-50 text-blue-600': item.source_type === 'article',
                                                    'bg-gray-100 text-gray-500': item.source_type === 'other'
                                                }"
                                                x-text="item.source_type === 'youtube' ? 'YouTube' : item.source_type === 'article' ? 'Article' : 'Link'"
                                            ></span>
                                            <span class="text-xs text-gray-400 truncate" x-text="getDomain(item.url)"></span>
                                        </div>
                                    </div>

                                    <button @click="deleteItem(item.id)" class="text-gray-300 hover:text-red-500 p-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <div x-show="items.length === 0 && !isLoading" class="text-center py-12 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2 text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                <p class="text-sm">No items yet</p>
                <p class="text-xs mt-1">Paste a link above to get started</p>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                items: [],
                newUrl: '',
                statusFilter: 'pending',
                isLoading: false,
                viewMode: 'list',
                currentYear: new Date().getFullYear(),
                currentMonth: new Date().getMonth(),
                selectedDate: null,
                itemDates: [],
                selectedDateItems: [],
                stats: { total: 0, pending: 0, completed: 0 },
                showMenu: false,

                init() {
                    this.fetchItems();
                    this.fetchItemDates();
                    this.fetchStats();
                },

                async fetchItems() {
                    try {
                        let url = `/api/items?status=${this.statusFilter}`;
                        if (this.viewMode === 'calendar' && this.selectedDate) {
                            url = `/api/items?date=${this.selectedDate}`;
                        }
                        const response = await fetch(url);
                        if (response.status === 401) {
                            window.location.href = '/login';
                            return;
                        }
                        const data = await response.json();
                        this.items = data.items;

                        if (this.viewMode === 'calendar' && this.selectedDate) {
                            this.selectedDateItems = this.items;
                        }
                    } catch (error) {
                        console.error('Failed to fetch items:', error);
                    }
                },

                async fetchItemDates() {
                    try {
                        const response = await fetch('/api/items/dates');
                        if (response.ok) {
                            const data = await response.json();
                            this.itemDates = data.dates;
                        }
                    } catch (error) {
                        console.error('Failed to fetch item dates:', error);
                    }
                },

                async fetchStats() {
                    try {
                        const response = await fetch('/api/items/stats');
                        if (response.ok) {
                            const data = await response.json();
                            this.stats = data;
                        }
                    } catch (error) {
                        console.error('Failed to fetch stats:', error);
                    }
                },

                async addItem() {
                    if (!this.newUrl || this.isLoading) return;

                    this.isLoading = true;
                    try {
                        const response = await fetch('/api/items', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ url: this.newUrl }),
                        });

                        if (response.ok) {
                            this.newUrl = '';
                            await this.fetchItems();
                            await this.fetchItemDates();
                            await this.fetchStats();
                        } else if (response.status === 401) {
                            window.location.href = '/login';
                        } else {
                            const data = await response.json();
                            alert(data.detail || 'Failed to add');
                        }
                    } catch (error) {
                        alert('Network error');
                    } finally {
                        this.isLoading = false;
                    }
                },

                async toggleComplete(item) {
                    try {
                        const response = await fetch(`/api/items/${item.id}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ completed: !item.completed }),
                        });

                        if (response.ok) {
                            await this.fetchItems();
                            await this.fetchStats();
                        } else if (response.status === 401) {
                            window.location.href = '/login';
                        }
                    } catch (error) {
                        console.error('Failed to toggle item:', error);
                    }
                },

                async deleteItem(id) {
                    if (!confirm('Delete this item?')) return;

                    try {
                        const response = await fetch(`/api/items/${id}`, {
                            method: 'DELETE',
                        });

                        if (response.ok) {
                            await this.fetchItems();
                            await this.fetchItemDates();
                            await this.fetchStats();
                        } else if (response.status === 401) {
                            window.location.href = '/login';
                        }
                    } catch (error) {
                        console.error('Failed to delete item:', error);
                    }
                },

                async logout() {
                    try {
                        await fetch('/api/logout', { method: 'POST' });
                        window.location.href = '/login';
                    } catch (error) {
                        console.error('Failed to logout:', error);
                    }
                },

                getDomain(url) {
                    try {
                        return new URL(url).hostname;
                    } catch {
                        return url;
                    }
                },

                formatDate(dateStr) {
                    const date = new Date(dateStr);
                    return date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });
                },

                get groupedItems() {
                    const groups = {};
                    this.items.forEach(item => {
                        const date = this.formatDate(item.captured_at);
                        if (!groups[date]) {
                            groups[date] = [];
                        }
                        groups[date].push(item);
                    });
                    return groups;
                },

                get calendarTitle() {
                    return new Date(this.currentYear, this.currentMonth).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                },

                get calendarDays() {
                    const days = [];
                    const firstDay = new Date(this.currentYear, this.currentMonth, 1);
                    const lastDay = new Date(this.currentYear, this.currentMonth + 1, 0);
                    const startPadding = firstDay.getDay();
                    const totalDays = lastDay.getDate();

                    const prevMonth = new Date(this.currentYear, this.currentMonth, 0);
                    for (let i = startPadding - 1; i >= 0; i--) {
                        const day = prevMonth.getDate() - i;
                        const date = this.formatDateStandard(prevMonth.getFullYear(), prevMonth.getMonth(), day);
                        days.push({ day, date, currentMonth: false, hasItems: this.hasItemsOnDate(date) });
                    }

                    for (let i = 1; i <= totalDays; i++) {
                        const date = this.formatDateStandard(this.currentYear, this.currentMonth, i);
                        days.push({ day: i, date, currentMonth: true, hasItems: this.hasItemsOnDate(date) });
                    }

                    const remaining = 42 - days.length;
                    for (let i = 1; i <= remaining; i++) {
                        const date = this.formatDateStandard(this.currentYear, this.currentMonth + 1, i);
                        days.push({ day: i, date, currentMonth: false, hasItems: this.hasItemsOnDate(date) });
                    }

                    return days;
                },

                formatDateStandard(year, month, day) {
                    const m = String(month + 1).padStart(2, '0');
                    const d = String(day).padStart(2, '0');
                    return `${year}-${m}-${d}`;
                },

                hasItemsOnDate(dateStr) {
                    return this.itemDates.includes(dateStr);
                },

                previousMonth() {
                    if (this.currentMonth === 0) {
                        this.currentMonth = 11;
                        this.currentYear--;
                    } else {
                        this.currentMonth--;
                    }
                },

                nextMonth() {
                    if (this.currentMonth === 11) {
                        this.currentMonth = 0;
                        this.currentYear++;
                    } else {
                        this.currentMonth++;
                    }
                },

                async selectDate(day) {
                    if (!day.currentMonth) return;
                    this.selectedDate = day.date;
                    await this.fetchItems();
                }
            }
        }
    </script>
</body>
</html>
