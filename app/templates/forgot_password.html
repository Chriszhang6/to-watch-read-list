<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password - Watchlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg shadow-sm w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Watchlist</h1>
            <p class="text-gray-400 text-sm mt-1">Reset your password</p>
        </div>

        <div id="successMsg" class="hidden text-center py-8">
            <div class="text-green-500 mb-3">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <p class="text-gray-700 font-medium">Check your email</p>
            <p class="text-gray-500 text-sm mt-1">We've sent a password reset link to your email address.</p>
            <a href="/login" class="inline-block mt-4 text-gray-800 hover:underline text-sm font-medium">Back to Sign In</a>
        </div>

        <form id="forgotForm" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-500 focus:border-gray-500 outline-none text-sm"
                    placeholder="Enter your email"
                >
            </div>

            <div id="errorMsg" class="hidden text-red-500 text-xs text-center py-1"></div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-gray-800 text-white py-2 px-4 rounded-lg hover:bg-gray-900 transition font-medium text-sm"
            >
                Send Reset Link
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="/login" class="text-sm text-gray-500 hover:text-gray-700">Back to Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('forgotForm');
            const successMsg = document.getElementById('successMsg');

            errorMsg.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                const data = await response.json();

                if (response.ok) {
                    form.classList.add('hidden');
                    successMsg.classList.remove('hidden');
                } else {
                    errorMsg.textContent = data.detail || 'Failed to send reset email';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
