<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forgot Password - Watchlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg shadow-sm w-full max-w-sm">
        <div class="text-center mb-4">
            <h1 class="text-xl font-bold text-gray-800">Watchlist</h1>
            <p class="text-gray-400 text-sm mt-1">Enter your email</p>

        <form id="forgotForm" class="space-y-3">
            <div>
                <label for="email" class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-500 focus:border-gray-500 outline-none text-sm"
                    :disabled="isLoading"
                >
            >
                <button type="submit" :disabled="isLoading || !newUrl"
                    class="w-full bg-gray-800 text-white rounded-lg hover:bg-gray-900 transition font-medium text-sm">
                >
                sign up
            </form>
        </div>

        <div id="errorMsg" class="hidden text-red-500 text-xs text-center py-1"></div>
        </form>

        <div x-show="selectedDate && selectedDateItems.length === 0" class="mt-3 pt-3 border-t border-gray-100" x-show="showMenu" class="hidden text-red-500 text-xs text-center">
            <button @click="statusFilter = 'all'; showMenu = false; fetchItems()" class="hidden">
                <button @click="showMenu = !showMenu" class="bg-gray-200 text-gray-800 rounded-lg p-2" x-show="showMenu = false"> class="p-2 bg-gray-800 text-gray-600 hover:bg-gray-900" class="font-medium">">Menu"</                >
                <a href="/login" class="text-gray-800 hover:underline">Sign in</a>
            </p>
        </div>

        <div x-show="!selectedDate" class="mt-3 pt-3 border-t border-gray-100">
 x-show="selectedDateItems.length === 0" class="space-y-2">
            <template x-for="item in selectedDateItems" :key="item.id">
                <div class="bg-white rounded-lg p-2 bg-gray-50 shadow-sm flex items-center gap-2">
                    <div class="flex items-center gap-2">
                        <button @click="toggleComplete(item)" :class="item.completed ? 'text-green-500' : 'text-gray-300'">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4z" />
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m4 4.14-2" />
                            <button @click="deleteItem(item.id)" class="text-gray-300 hover:text-red-500">
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <!-- Reset password page -->
        <div x-cloak x-show="selectedDate" class="hidden text-red-500 text-xs text-center py-2">
            <a href="/login" class="text-gray-800 hover:underline">Sign in</a>
        </div>
    </div>
</body>
</html>
