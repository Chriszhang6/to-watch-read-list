<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up - Watchlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg shadow-sm w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Watchlist</h1>
            <p class="text-gray-400 text-sm mt-1">Create your account</p>
        </div>

        <form id="registerForm" class="space-y-3">
            <div>
                <label for="email" class="block text-xs font-medium text-gray-500 mb-1">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm"
                    placeholder="you@example.com"
                >
            </div>
            <div>
                <label for="password" class="block text-xs font-medium text-gray-500 mb-1">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    minlength="6"
                    autocomplete="new-password"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm"
                    placeholder="At least 6 characters"
                >
            </div>
            <div>
                <label for="confirmPassword" class="block text-xs font-medium text-gray-500 mb-1">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    required
                    minlength="6"
                    autocomplete="new-password"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-sm"
                    placeholder="Confirm your password"
                >
            </div>

            <div id="errorMsg" class="hidden text-red-500 text-xs text-center py-1"></div>

            <button
                type="submit"
                class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition font-medium text-sm"
            >
                Sign Up
            </button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-sm text-gray-400">
                Already have an account?
                <a href="/login" class="text-blue-500 hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Clear previous error
            errorMsg.classList.add('hidden');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                if (response.ok) {
                    // Registration successful, redirect to login
                    window.location.href = '/login?registered=true';
                } else {
                    const data = await response.json();
                    errorMsg.textContent = data.detail || 'Registration failed';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });

        // Show success message if redirected from registration
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'Account created! Please sign in.';
            errorMsg.classList.remove('hidden');
            errorMsg.classList.remove('text-red-500');
            errorMsg.classList.add('text-green-500');
        }
    </script>
</body>
</html>
