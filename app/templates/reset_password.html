<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password - Watchlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg shadow-sm w-full max-w-sm">
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-gray-800">Watchlist</h1>
            <p class="text-gray-400 text-sm mt-1">Create new password</p>
        </div>

        <div id="errorMsg" class="hidden text-red-500 text-xs text-center py-1 mb-4"></div>

        <div id="invalidToken" class="hidden text-center py-4">
            <div class="text-red-500 mb-3">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </div>
            <p class="text-gray-700 font-medium">Invalid or expired link</p>
            <p class="text-gray-500 text-sm mt-1">This password reset link is no longer valid.</p>
            <a href="/forgot-password" class="inline-block mt-4 text-gray-800 hover:underline text-sm font-medium">Request new link</a>
        </div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label for="password" class="block text-xs font-medium text-gray-500 mb-1">New Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="new-password"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-500 focus:border-gray-500 outline-none text-sm"
                    placeholder="At least 6 characters"
                >
            </div>

            <div>
                <label for="confirmPassword" class="block text-xs font-medium text-gray-500 mb-1">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    required
                    autocomplete="new-password"
                    class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-gray-500 focus:border-gray-500 outline-none text-sm"
                    placeholder="Confirm new password"
                >
            </div>

            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-gray-800 text-white py-2 px-4 rounded-lg hover:bg-gray-900 transition font-medium text-sm"
            >
                Reset Password
            </button>
        </form>

        <div id="successMsg" class="hidden text-center py-4">
            <div class="text-green-500 mb-3">
                <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <p class="text-gray-700 font-medium">Password reset successful</p>
            <p class="text-gray-500 text-sm mt-1">You can now sign in with your new password.</p>
            <a href="/login" class="inline-block mt-4 bg-gray-800 text-white px-6 py-2 rounded-lg hover:bg-gray-900 text-sm font-medium">Sign In</a>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('resetForm').classList.add('hidden');
            document.getElementById('invalidToken').classList.remove('hidden');
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            const form = document.getElementById('resetForm');
            const successMsg = document.getElementById('successMsg');

            errorMsg.classList.add('hidden');

            // Validate passwords match
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.classList.remove('hidden');
                return;
            }

            // Validate password length
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    form.classList.add('hidden');
                    successMsg.classList.remove('hidden');
                } else {
                    errorMsg.textContent = data.detail || 'Failed to reset password';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
